name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --frozen-lockfile pins exact versions, so pnpm 11's minimumReleaseAge
      # gate (which can reject freshly-published pinned deps) is redundant here.
      - run: pnpm install --frozen-lockfile --config.minimumReleaseAge=0

      - run: pnpm --config.verifyDepsBeforeRun=false test

      - run: pnpm --config.verifyDepsBeforeRun=false build

      # Run wrangler via npx (npm) rather than cloudflare/wrangler-action, which
      # installs wrangler with pnpm and re-triggers the build-script policy
      # (wrangler pulls in workerd/esbuild). wrangler reads creds from env.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 790369fbd60bd3d4d6e34bacbd0c854d
        run: npx -y wrangler@4 pages deploy dist --project-name=anonymouspdf --branch=main
